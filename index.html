<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍪 Cookie Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cookies.css">

  <!-- Seus estilos extras mantidos -->
  <style>
    /* seus estilos de .delivery-deadline, .confirm-modal, .pix-section, etc. */
    /* (pode deixar exatamente como estava) */
  </style>
</head>
<body>

  <!-- ... todo o seu header, main, seções de loja, carrinho, admin ... (mantenha igual) -->

  <!-- CARRINHO - FORMULÁRIO CORRIGIDO -->
  <section class="tab-panel" id="tab-carrinho">
    <div class="section-header"><h1>Seu Carrinho</h1></div>
    <div class="cart-empty hidden" id="cartEmpty"> ... </div>
    
    <div class="cart-layout" id="cartLayout">
      <div class="cart-left"> ... seus itens ... </div>
      
      <div class="cart-right">
        <h2 class="cart-section-title">Dados para Entrega</h2>
        
        <!-- FORMULÁRIO COM ACTION PARA O APPS SCRIPT -->
        <form id="orderForm" 
              action="https://script.google.com/macros/s/AKfycbydz_Ttga8zBwyTSAQykrk1_g1ezD9WGy8C2_SO3bGz-AJyt8OIu_wpNxyD4mAge5_k/exec" 
              method="POST"
              target="_self">
          
          <div class="form-group">
            <label for="clientName">Nome completo *</label>
            <input type="text" id="clientName" name="nome" placeholder="Seu nome" required>
          </div>
          <div class="form-group">
            <label for="clientPhone">Telefone / WhatsApp *</label>
            <input type="tel" id="clientPhone" name="telefone" placeholder="(11) 99999-9999" required>
          </div>
          <div class="form-group">
            <label for="clientSlack">@ Slack</label>
            <input type="text" id="clientSlack" name="slack" placeholder="@seunome">
          </div>
          <div class="form-group">
            <label for="paymentMethod">Forma de pagamento *</label>
            <select id="paymentMethod" name="pagamento" required>
              <option value="">Selecione...</option>
              <option value="PIX">PIX</option>
              <option value="Dinheiro">Dinheiro</option>
              <option value="Cartão de Crédito">Cartão de Crédito</option>
              <option value="Cartão de Débito">Cartão de Débito</option>
            </select>
          </div>
          <div class="form-group">
            <label for="orderNotes">Observações</label>
            <textarea id="orderNotes" name="observacoes" rows="3" placeholder="Alergias, preferências..."></textarea>
          </div>

          <button type="submit" class="btn btn--primary btn--full btn--big" id="submitOrder">
            <span id="submitLabel">Enviar Pedido 🍪</span>
            <span id="submitLoading" class="hidden">Enviando...</span>
          </button>
          <p class="form-note">* Campos obrigatórios</p>
        </form>
      </div>
    </div>
  </section>

  <!-- resto do seu HTML (modais, toast, etc.) permanece igual -->

  <script src="cookies.js"></script>
</body>
</html>
